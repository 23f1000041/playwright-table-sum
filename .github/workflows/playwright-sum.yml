name: Playwright Table Sum

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  run-sum:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # REQUIRED: your email must be in the step name
      - name: Run scraper (23f1000041@ds.study.iitm.ac.in)
        run: npm run sum
